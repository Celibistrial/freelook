name: Update Minecraft Version

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 8am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Read current versions
        id: current
        run: |
          echo "mc=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "mod=$(grep '^mod_version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Fetch latest stable Minecraft version
        id: latest_mc
        run: |
          LATEST=$(curl -sf https://meta.fabricmc.net/v2/versions/game | \
            jq -r '[.[] | select(.stable == true)] | first | .version')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.mc }}"
          LATEST="${{ steps.latest_mc.outputs.version }}"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "No update needed ($CURRENT is already latest)"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Update needed: $CURRENT -> $LATEST"
          fi

      - name: Fetch new Fabric loader and API versions
        id: fabric
        if: steps.check.outputs.needed == 'true'
        run: |
          MC="${{ steps.latest_mc.outputs.version }}"

          LOADER=$(curl -sf "https://meta.fabricmc.net/v2/versions/loader/$MC" | \
            jq -r '[.[] | select(.loader.stable == true)] | first | .loader.version')

          API=$(curl -sf "https://api.modrinth.com/v2/project/fabric-api/version?game_versions=%5B%22$MC%22%5D&loaders=%5B%22fabric%22%5D" | \
            jq -r 'first | .version_number')

          # Mod Menu is a runtime dependency that must match the MC version, else the
          # client compiles but crashes on the title screen (e.g. removed I18n.exists).
          MODMENU=$(curl -sf "https://api.modrinth.com/v2/project/modmenu/version?game_versions=%5B%22$MC%22%5D&loaders=%5B%22fabric%22%5D" | \
            jq -r 'first | .version_number')

          echo "loader=$LOADER" >> $GITHUB_OUTPUT
          echo "api=$API" >> $GITHUB_OUTPUT
          echo "modmenu=$MODMENU" >> $GITHUB_OUTPUT

      - name: Bump mod version (patch)
        id: mod_version
        if: steps.check.outputs.needed == 'true'
        run: |
          CURRENT="${{ steps.current.outputs.mod }}"
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Apply version updates
        if: steps.check.outputs.needed == 'true'
        run: |
          MC="${{ steps.latest_mc.outputs.version }}"
          LOADER="${{ steps.fabric.outputs.loader }}"
          API="${{ steps.fabric.outputs.api }}"
          MOD="${{ steps.mod_version.outputs.version }}"
          MODMENU="${{ steps.fabric.outputs.modmenu }}"

          sed -i "s/^minecraft_version=.*/minecraft_version=$MC/" gradle.properties
          sed -i "s/^loader_version=.*/loader_version=$LOADER/" gradle.properties
          sed -i "s/^fabric_version=.*/fabric_version=$API/" gradle.properties
          sed -i "s/^mod_version=.*/mod_version=$MOD/" gradle.properties

          # Only bump Mod Menu when a compatible build exists; never write an empty/null.
          if [ -n "$MODMENU" ] && [ "$MODMENU" != "null" ]; then
            sed -i "s/^modmenu_version=.*/modmenu_version=$MODMENU/" gradle.properties
          else
            echo "WARNING: no Mod Menu build found for $MC; leaving modmenu_version unchanged."
          fi

          # Keep fabric.mod.json's minecraft dependency in sync (major.minor, e.g. 26.2.1 -> ~26.2)
          MM=$(echo "$MC" | cut -d. -f1,2)
          sed -i "s/\"minecraft\": *\"[^\"]*\"/\"minecraft\": \"~$MM\"/" src/main/resources/fabric.mod.json

          echo "Updated gradle.properties:"
          grep -E '^(minecraft|loader|fabric|mod|modmenu)_version=' gradle.properties
          echo "Updated fabric.mod.json minecraft dependency:"
          grep '"minecraft"' src/main/resources/fabric.mod.json

      - name: Build
        id: build
        if: steps.check.outputs.needed == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew build --no-daemon 2>&1 | tee build.log

      - name: Open issue on build failure
        if: steps.check.outputs.needed == 'true' && steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MC="${{ steps.latest_mc.outputs.version }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="Auto-update to Minecraft $MC failed to build"

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue already open: #$EXISTING — skipping."
            exit 0
          fi

          ERRORS=$(grep -E "error:|cannot find symbol|Compilation failed|> Task .* FAILED" build.log | head -40 || true)

          gh issue create \
            --title "$TITLE" \
            --body "Automated Minecraft update to \`$MC\` could not build — likely an API/mapping change needing manual source fixes.

          | Property | Value |
          |---|---|
          | Minecraft | \`$MC\` |
          | Fabric Loader | \`${{ steps.fabric.outputs.loader }}\` |
          | Fabric API | \`${{ steps.fabric.outputs.api }}\` |

          [Failed workflow run]($RUN_URL)

          <details><summary>Build error excerpt</summary>

          \`\`\`
          $ERRORS
          \`\`\`
          </details>"

      - name: Create PR
        if: steps.check.outputs.needed == 'true' && steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MC="${{ steps.latest_mc.outputs.version }}"
          MOD="${{ steps.mod_version.outputs.version }}"
          BRANCH="update/mc-$MC"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add gradle.properties src/main/resources/fabric.mod.json
          git commit -m "Update project to Minecraft $MC (v$MOD)"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update to Minecraft $MC (v$MOD)" \
            --body "Automated version bump.

          | Property | Value |
          |---|---|
          | Minecraft | \`$MC\` |
          | Fabric Loader | \`${{ steps.fabric.outputs.loader }}\` |
          | Fabric API | \`${{ steps.fabric.outputs.api }}\` |
          | Mod version | \`$MOD\` |

          Build passed. ✓" \
            --base master \
            --head "$BRANCH"

      - name: Fail job if build failed
        if: steps.check.outputs.needed == 'true' && steps.build.outcome == 'failure'
        run: |
          echo "Build failed for the auto-update; an issue was opened. Failing the job."
          exit 1
